name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install
        run: uv pip install -e ".[dev]" --system

      - name: Lint
        run: |
          ruff format --check src tests
          ruff check src tests

      - name: Typecheck
        run: mypy

      - name: Test
        run: pytest
